<!DOCTYPE html>
<html>
<head>
    <title>Biodata Diri</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        table {
            width: 700px;
            margin: auto;
            background-color: white;
            border-collapse: collapse;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            vertical-align: top;
        }
        th {
            background-color: #4CAF50;
            color: white;
            text-align: left;
            width: 30%;
        }
        .foto {
            width: 200px;
            height: auto;
            display: block;
            margin: auto;
            border: 3px solid #ddd;
        }
        h2 {
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>

<h2>📄 BIODATA DIRI</h2>

<table>
    <tr>
        <th>Foto Diri</th>
        <td>
            <!-- Ganti 'foto.jpg' dengan nama file foto kamu -->
            <img src="foto.jpg" alt="Foto Profil" class="foto">
        </td>
    </tr>
    <tr>
        <th>Nama Lengkap</th>
        <td>[Tulis Nama Kamu]</td>
    </tr>
    <tr>
        <th>Nama Orang Tua</th>
        <td>
            Ayah : [Nama Ayah]<br>
            Ibu  : [Nama Ibu]
        </td>
    </tr>
    <tr>
        <th>Nomor HP / WhatsApp</th>
        <td>[0812xxxxxxxx]</td>
    </tr>
    <tr>
        <th>Hobi</th>
        <td>[Misal: Memasak, Membaca, Mendengarkan Musik]</td>
    </tr>
    <tr>
        <th>Alamat Lengkap</th>
        <td>[Tulis Alamat Rumah Kamu Disini]</td>
    </tr>
    <tr>
        <th>Lagu Favorit</th>
        <td>
            <!-- Ganti 'musik.mp3' dengan nama file lagu kamu -->
            <audio controls autoplay>
                <source src="musik.mp3" type="audio/mpeg">
                Browser kamu tidak support pemutar musik.
            
        </td>
    </tr>
</table>

</body>
</html>
